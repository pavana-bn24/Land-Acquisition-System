  <main>
    <h1 class="dashboard-title">Dashboard</h1>

    <section class="plot-layout">
      <img src="C:\xampp\htdocs\VillaPlotsWebsite1\images\sitelayout.jpg.jpg" alt="Plot Layout" />
    </section>

    <section class="plot-status">
      <h2>Current Plot Status:</h2>
      <div class="plots">
        <button class="available">Plot 1</button>
        <button class="sold">Plot 2</button>
        <button class="available">Plot 3</button>
        <button class="available">Plot 4</button>

    <section class="chart-sheet">
        <h2>Chart Sheet:</h2>
      
        <div class="legend status-legend">

          <div class="status-box reserved">Reserved</div>
          <div class="status-box sold">Sold</div>
        </div>
      
        <div class="legend size-legend">
          <div class="legend-box size1">30×40</div>
          <div class="legend-box size2">30×60</div>
          <div class="legend-box size3">60×40</div>
          <div class="legend-box size4">50×60</div>
